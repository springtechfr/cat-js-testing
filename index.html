<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Fleet Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-8">
    
    <div id="loading-screen" class="flex flex-col items-center justify-center mt-32 space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-700"></div>
        <p class="text-gray-500 italic">Verifying session status...</p>
    </div>

    <div id="login-screen" class="hidden max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-md border border-gray-100 text-center">
        <div class="mb-6">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-slate-100 text-slate-700 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-900">System Authentication</h2>
            <p class="text-gray-400 text-sm mt-1">Enter password to unlock operational controls.</p>
        </div>
        <div class="space-y-4">
            <input type="password" id="secret-input" placeholder="System password..." 
                   class="w-full px-4 py-3 border border-gray-200 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-slate-500">
            <button onclick="loginWithPassword()" class="w-full bg-slate-700 hover:bg-slate-800 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-sm">
                Login
            </button>
        </div>
    </div>

    <div id="app-content" class="hidden space-y-6">
        
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 id="app-title" class="text-2xl font-bold text-gray-900 tracking-tight">Equipment Fleet Management</h1>
            <div class="flex items-center gap-4 w-full sm:w-auto justify-end">
                <div class="flex items-center gap-2">
                    <label for="date-filter" class="text-sm font-medium text-gray-500 whitespace-nowrap">Situation Date:</label>
                    <input type="date" id="date-filter" onchange="loadInventoryData()" class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                </div>
                <button onclick="logout()" class="bg-red-50 hover:bg-red-100 text-red-600 font-medium text-sm py-1.5 px-4 rounded-lg transition duration-200 border border-red-200">
                    Sign Out
                </button>
            </div>
        </div>

        <div id="error-msg" class="hidden p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r shadow-sm font-medium transition duration-200"></div>

        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4">
            <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider">Register New Hardware</h3>
            <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                <input type="text" id="add-uid" placeholder="UID" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                
                <select id="add-group-id" class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500"></select>
                <select id="add-type" class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500"></select>
                
                <input type="text" id="add-name" placeholder="Model Name" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                <input type="number" id="add-qty" placeholder="Quantity" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                <input type="number" step="0.01" id="add-cost" placeholder="Unit Purchase Cost" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <input type="text" id="add-code" placeholder="Model Code" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                <input type="text" id="add-alt-code" placeholder="Backup Code" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                <input type="text" id="add-serial" placeholder="Serial N°" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500">
                
                <select id="add-region" class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-slate-500"></select>
                
                <button onclick="submitHardware()" class="bg-slate-700 hover:bg-slate-800 text-white font-semibold rounded-lg text-sm py-2 px-4 transition duration-200 shadow-sm">
                    Create
                </button>
            </div>
        </div>

        <div id="inventory-section" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-5 border-b border-gray-100">
                <h2 id="table-header" class="text-lg font-bold text-gray-900">...</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr id="table-head-row" class="bg-slate-700 text-white text-xs font-semibold uppercase tracking-wider"></tr>
                    </thead>
                    <tbody id="inventory-tbody" class="divide-y divide-gray-100 text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="summary-section" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 id="summary-header" class="text-lg font-bold text-gray-900 mb-4 pb-2 border-b border-gray-100">...</h2>
            <div id="summary-content" class="text-gray-600"></div>
        </div>
    </div>
</div>

<script>
    const API_ROUTE = "https://vi1ch5yfp2.execute-api.eu-west-1.amazonaws.com/dev/cats"; 

    let dictionary = null;

    function getSecureHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-Poste-Config': localStorage.getItem('parc_password') || ''
        };
    }

    window.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('date-filter').value = new Date().toISOString().split('T')[0];
        
        const savedPassword = localStorage.getItem('parc_password');
        const loginTimestamp = localStorage.getItem('parc_login_time');
        const oneWeekInMs = 7 * 24 * 60 * 60 * 1000; 

        if (savedPassword && loginTimestamp && (Date.now() - loginTimestamp < oneWeekInMs)) {
            const authorized = await loadDictionary();
            if (authorized) { 
                showApp(); 
                return; 
            }
        }
        
        logoutSilently();
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
    });

    async function loginWithPassword() {
        const password = document.getElementById('secret-input').value;
        if (!password) return;
        hideError();

        try {
            localStorage.setItem('parc_password', password);
            localStorage.setItem('parc_login_time', Date.now().toString());

            const authorized = await loadDictionary();
            if (authorized) { 
                showApp(); 
            } else { 
                throw new Error("Invalid operational configuration password or network negotiation rejected."); 
            }
        } catch (err) {
            logoutSilently();
            showError(err.message || "Network authorization validation handshake failed.");
        }
    }

    function showApp() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-content').classList.remove('hidden');
        loadInventoryData();
    }

    function logoutSilently() {
        localStorage.removeItem('parc_password');
        localStorage.removeItem('parc_login_time');
    }

    function logout() { 
        logoutSilently(); 
        window.location.reload(); 
    }

    async function loadDictionary() {
        try {
            const response = await fetch(`${API_ROUTE}?action=config`, { method: 'GET', headers: getSecureHeaders() });
            if (!response.ok) return false;
            
            dictionary = await response.json();
            
            document.getElementById('page-title').innerText = dictionary.titles.app_title;
            document.getElementById('app-title').innerText = dictionary.titles.app_title;
            document.getElementById('table-header').innerText = dictionary.titles.table_header;
            document.getElementById('summary-header').innerText = dictionary.titles.summary_header;
            
            const fields = dictionary.fields;
            
            document.getElementById('table-head-row').innerHTML = `
                <th class="px-4 py-3">${fields.uid}</th><th class="px-4 py-3">${fields.group_id}</th>
                <th class="px-4 py-3">${fields.type}</th><th class="px-4 py-3">${fields.model_name}</th>
                <th class="px-4 py-3">${fields.model_code}</th><th class="px-4 py-3">${fields.alt_code}</th>
                <th class="px-4 py-3">${fields.region}</th>
                <th class="px-4 py-3">${fields.unit_count}</th><th class="px-4 py-3">${fields.current_cost}</th>
                <th class="px-4 py-3">${fields.serial_number}</th><th class="px-4 py-3">${fields.live_value}</th>
                <th class="px-4 py-3 text-center">System Actions</th>
            `;

            document.getElementById('add-uid').placeholder = fields.uid;
            document.getElementById('add-name').placeholder = fields.model_name;
            document.getElementById('add-qty').placeholder = fields.unit_count;
            document.getElementById('add-cost').placeholder = fields.base_cost;
            document.getElementById('add-code').placeholder = fields.model_code;
            document.getElementById('add-alt-code').placeholder = fields.alt_code;
            document.getElementById('add-serial').placeholder = fields.serial_number;

            // Helper function to build select nodes dynamically from arrays
            const populateSelect = (elementId, arrayData) => {
                const selectElement = document.getElementById(elementId);
                selectElement.innerHTML = "";
                if (arrayData) {
                    arrayData.forEach(item => {
                        const opt = document.createElement('option');
                        opt.value = item;
                        opt.innerText = item;
                        selectElement.appendChild(opt);
                    });
                }
            };

            // Dynamically constructing all backend configuration driven dropdown systems
            populateSelect('add-region', dictionary.regions);
            populateSelect('add-group-id', dictionary.groups);
            populateSelect('add-type', dictionary.categories);

            return true;
        } catch (err) { 
            return false; 
        }
    }

    async function loadInventoryData() {
        const tbody = document.getElementById('inventory-tbody');
        const summaryDiv = document.getElementById('summary-content');
        const inventorySection = document.getElementById('inventory-section');
        const summarySection = document.getElementById('summary-section');
        const chosenDate = document.getElementById('date-filter').value;
        
        tbody.innerHTML = `<tr><td colspan="12" class="text-center py-8 text-gray-400 italic bg-gray-50/50">Aligning and syncing hardware...</td></tr>`;

        try {
            const response = await fetch(`${API_ROUTE}?action=list&date=${chosenDate}`, { method: 'GET', headers: getSecureHeaders() });
            if (response.status === 401 || response.status === 403) { 
                logout(); 
                return; 
            }
            
            const data = await response.json();

            if (!response.ok) {
                showError(data.message || `Data synchronization failure (${response.status})`);
                tbody.innerHTML = "";
                summaryDiv.innerHTML = "";
                inventorySection.classList.add('hidden');
                summarySection.classList.add('hidden');
                return;
            }
            
            hideError();
            inventorySection.classList.remove('hidden');
            summarySection.classList.remove('hidden');
            tbody.innerHTML = "";
            
            if (!data.inventory || data.inventory.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" class="text-center py-8 text-gray-400">No hardware found for this date.</td></tr>`;
                summaryDiv.innerHTML = `<p class="text-gray-400 italic">No historical data consolidated.</p>`;
                return;
            }

            data.inventory.forEach(item => {
                const rawCost = item.current_cost ? Number(item.current_cost) : 0;
                const formattedCost = Math.round(rawCost).toLocaleString('en-US');
                
                const rawValue = item.live_value ? Number(item.live_value) : 0;
                const roundedLiveValue = Math.round(rawValue).toLocaleString('en-US');

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50/70 transition duration-150">
                        <td class="px-4 py-3 text-xs text-gray-400 font-mono">${item.uid || ''}</td>
                        <td class="px-4 py-3 font-semibold text-slate-700">${item.group_id || 'Global'}</td>
                        <td class="px-4 py-3"><span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-50 text-blue-700">${item.type || ''}</span></td>
                        <td class="px-4 py-3 text-gray-900">${item.model_name || ''}</td>
                        <td class="px-4 py-3"><code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded text-gray-600">${item.model_code || '-'}</code></td>
                        <td class="px-4 py-3 text-xs text-gray-500">${item.alt_code || '-'}</td>
                        <td class="px-4 py-3 text-xs font-bold text-slate-500">${item.region || 'NONE'}</td>
                        
                        <td class="px-4 py-3 font-mono text-gray-600" id="qty-container-${item.uid}">
                            <span id="qty-text-${item.uid}">${item.unit_count || 0}</span>
                        </td>
                        
                        <td class="px-4 py-3 font-mono text-gray-600">${formattedCost} <span class="text-xs font-bold text-slate-400 ml-0.5">${item.base_unit || ''}</span></td>
                        <td class="px-4 py-3 text-xs text-gray-500 font-mono">${item.serial_number || '-'}</td>
                        <td class="px-4 py-3 font-bold text-gray-900">${roundedLiveValue} €</td>
                        <td class="px-4 py-3 text-center space-x-1 whitespace-nowrap">
                            <button id="btn-edit-${item.uid}" onclick="enableQtyEdit('${item.uid}')" class="bg-slate-50 hover:bg-slate-100 text-slate-600 font-medium text-xs py-1 px-2 rounded border border-gray-200 transition">
                                Edit
                            </button>
                            <button onclick="purgeHardware('${item.uid}')" class="bg-red-50 hover:bg-red-100 text-red-600 font-medium text-xs py-1 px-2 rounded border border-red-200 transition">
                                Purge
                            </button>
                        </td>
                    </tr>
                `;
            });

            summaryDiv.innerHTML = "";
            if (data.summary_totals) {
                let html = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">`;
                for (const [group, total] of Object.entries(data.summary_totals)) {
                    const roundedTotal = Math.round(Number(total)).toLocaleString('en-US');
                    html += `
                        <div class="p-4 bg-slate-50 rounded-xl border border-gray-100 flex flex-col justify-between">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Group [${group}]</span>
                            <span class="text-2xl font-extrabold text-slate-800 mt-1">${roundedTotal} <span class="text-sm font-normal text-gray-400">€</span></span>
                        </div>`;
                }
                html += `</div>`;
                summaryDiv.innerHTML = html;
            }
        } catch (err) {
            showError(err.message);
            tbody.innerHTML = `<tr><td colspan="12" class="text-center py-8 text-red-500 font-medium">Failed to load data components.</td></tr>`;
            summaryDiv.innerHTML = "";
            inventorySection.classList.add('hidden');
            summarySection.classList.add('hidden');
        }
    }

    function enableQtyEdit(uid) {
        const container = document.getElementById(`qty-container-${uid}`);
        const currentQty = document.getElementById(`qty-text-${uid}`).innerText;
        
        container.innerHTML = `<input type="number" id="input-qty-${uid}" value="${currentQty}" class="w-20 px-1.5 py-0.5 border border-slate-300 rounded font-mono text-sm focus:outline-none focus:ring-1 focus:ring-slate-500">`;
        
        const editBtn = document.getElementById(`btn-edit-${uid}`);
        editBtn.innerText = "Save";
        editBtn.className = "bg-green-50 hover:bg-green-100 text-green-700 font-medium text-xs py-1 px-2 rounded border border-green-200 transition";
        editBtn.setAttribute("onclick", `saveQtyChanges('${uid}')`);
    }

    async function saveQtyChanges(uid) {
        hideError();
        const updatedQty = document.getElementById(`input-qty-${uid}`).value;

        if(!updatedQty || Number(updatedQty) < 0) {
            showError("Invalid quantity value.");
            return;
        }

        const payload = {
            uid: uid,
            unit_count: updatedQty
        };

        try {
            const response = await fetch(`${API_ROUTE}?action=push`, {
                method: 'POST',
                headers: getSecureHeaders(),
                body: JSON.stringify(payload)
            });

            if(!response.ok) {
                const fault = await response.json();
                throw new Error(fault.error || "Failed to update quantity.");
            }

            loadInventoryData();
        } catch (err) {
            showError(err.message);
        }
    }

    async function submitHardware() {
        hideError();
        const payload = {
            uid: document.getElementById('add-uid').value,
            group_id: document.getElementById('add-group-id').value,
            type: document.getElementById('add-type').value,
            model_name: document.getElementById('add-name').value,
            unit_count: document.getElementById('add-qty').value,
            base_cost: document.getElementById('add-cost').value,
            model_code: document.getElementById('add-code').value,
            alt_code: document.getElementById('add-alt-code').value,
            serial_number: document.getElementById('add-serial').value,
            region: document.getElementById('add-region').value
        };

        try {
            const response = await fetch(`${API_ROUTE}?action=push`, {
                method: 'POST',
                headers: getSecureHeaders(),
                body: JSON.stringify(payload)
            });

            if(!response.ok) {
                const fault = await response.json();
                throw new Error(fault.error || "Execution engine exception during mutation deployment.");
            }

            ['add-uid', 'add-name', 'add-qty', 'add-cost', 'add-code', 'add-alt-code', 'add-serial'].forEach(id => {
                document.getElementById(id).value = "";
            });

            loadInventoryData();
        } catch (err) {
            showError(err.message);
        }
    }

    async function purgeHardware(targetUid) {
        if (!confirm(`Confirm irreversible data purge sequence for node: ${targetUid}?`)) return;
        hideError();

        try {
            const response = await fetch(`${API_ROUTE}?action=purge`, {
                method: 'POST',
                headers: getSecureHeaders(),
                body: JSON.stringify({ target: targetUid })
            });

            if(!response.ok) {
                const fault = await response.json();
                throw new Error(fault.error || "Failed to remove database hardware entity records.");
            }

            loadInventoryData();
        } catch (err) {
            showError(err.message);
        }
    }

    function showError(msg) {
        const errorDiv = document.getElementById('error-msg');
        errorDiv.innerText = msg; 
        errorDiv.classList.remove('hidden');
    }
    
    function hideError() { 
        document.getElementById('error-msg').classList.add('hidden'); 
    }
</script>
</body>
</html>
