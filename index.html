<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Fleet Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-8">
    
    <div id="loading-screen" class="flex flex-col items-center justify-center mt-32 space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-slate-700"></div>
        <p class="text-gray-500 italic">Verifying session status...</p>
    </div>

    <div id="login-screen" class="hidden max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-md border border-gray-100 text-center">
        <div class="mb-6">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-slate-100 text-slate-700 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" /></svg>
            </div>
            <h2 class="text-xl font-bold text-gray-900">Node Management Portal</h2>
            <p class="text-sm text-gray-500">Authentication mandatory</p>
        </div>
        <input type="password" id="auth-token" placeholder="Authorization token" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 mb-4 text-center">
        <button onclick="handleLogin()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-4 rounded-lg transition duration-200 shadow-sm">Initialize</button>
    </div>

    <div id="main-screen" class="hidden space-y-8">
        <div class="flex justify-between items-center border-b border-gray-200 pb-5">
            <div>
                <h1 id="app-heading" class="text-2xl font-bold tracking-tight text-gray-900">Infrastructure Inventory</h1>
                <p class="text-sm text-gray-500 mt-1">Multi-group asset aggregation and telemetry metrics</p>
            </div>
            <button onclick="handleLogout()" class="text-sm text-gray-500 hover:text-red-600 font-medium transition">Terminate Session</button>
        </div>

        <div id="error-msg" class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg text-sm text-red-700 shadow-sm"></div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 id="form-heading" class="text-lg font-semibold text-gray-900 mb-4">Register New Entity</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                <div>
                    <label id="lbl-group" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Group ID</label>
                    <select id="add-group" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 bg-white text-sm"></select>
                </div>
                <div>
                    <label id="lbl-type" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Asset Classification</label>
                    <select id="add-type" onchange="handleTypeChange()" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 bg-white text-sm"></select>
                </div>
                <div>
                    <label id="lbl-uid" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Unique Identifier</label>
                    <input type="text" id="add-uid" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
                <div>
                    <label id="lbl-name" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Label Name</label>
                    <input type="text" id="add-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
                <div>
                    <label id="lbl-qty" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Quantity / Allocation</label>
                    <input type="number" step="any" id="add-qty" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
                <div>
                    <label id="lbl-cost" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Acquisition Cost</label>
                    <input type="number" step="any" id="add-cost" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
                <div>
                    <label id="lbl-base-unit" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Base Unit</label>
                    <select id="add-base-unit" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 bg-white text-sm"></select>
                </div>
                <div>
                    <label id="lbl-region" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Deployment Region</label>
                    <select id="add-region" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 bg-white text-sm"></select>
                </div>
                <div>
                    <label id="lbl-code" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">System Code</label>
                    <input type="text" id="add-code" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
                <div>
                    <label id="lbl-alt-code" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Backup Code</label>
                    <input type="text" id="add-alt-code" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
                <div class="sm:col-span-2">
                    <label id="lbl-serial" class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1">Serial Number</label>
                    <input type="text" id="add-serial" class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-slate-500 text-sm">
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button onclick="registerHardware()" class="bg-slate-800 hover:bg-slate-900 text-white text-sm font-medium py-2 px-6 rounded-lg transition duration-200 shadow-sm">Commit Database Record</button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex flex-wrap justify-between items-center gap-4 bg-gray-50">
                <h2 id="table-heading" class="text-lg font-semibold text-gray-900">Active Node Topologies</h2>
                <div class="flex items-center space-y-0 space-x-4">
                    <span id="lbl-summary" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Metrics Consolidation:</span>
                    <div id="stats-container" class="flex space-x-3 text-sm font-medium text-gray-700"></div>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr id="table-headers" class="border-b border-gray-200 bg-white text-xs font-semibold uppercase tracking-wider text-gray-500"></tr>
                    </thead>
                    <tbody id="inventory-table-body" class="divide-y divide-gray-100 bg-white text-sm text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_ROUTE = 'https://oiv489d8vj.execute-api.eu-west-3.amazonaws.com/prod/portfolio';
    let dictionary = null;

    window.addEventListener('DOMContentLoaded', async () => {
        const secret = localStorage.getItem('fleet_session_token');
        if (secret) {
            document.getElementById('auth-token').value = secret;
            await initializeSystem();
        } else {
            transitionScreen('login-screen');
        }
    });

    function transitionScreen(target) {
        ['loading-screen', 'login-screen', 'main-screen'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(target).classList.remove('hidden');
    }

    async function handleLogin() {
        const token = document.getElementById('auth-token').value.trim();
        if(!token) return alert('Token value missing');
        localStorage.setItem('fleet_session_token', token);
        await initializeSystem();
    }

    function handleLogout() {
        localStorage.removeItem('fleet_session_token');
        document.getElementById('auth-token').value = "";
        transitionScreen('login-screen');
    }

    function getSecureHeaders() {
        return {
            'Content-Type': 'application/json',
            'X-Poste-Config': localStorage.getItem('fleet_session_token') || ''
        };
    }

    async function initializeSystem() {
        transitionScreen('loading-screen');
        hideError();
        try {
            const response = await fetch(`${API_ROUTE}?action=config`, {
                method: 'GET',
                headers: getSecureHeaders()
            });
            if(!response.ok) throw new Error('Authorization rejected or config load error');
            
            dictionary = await response.json();
            applyLanguageOverlay();
            populateFormDropdowns();
            handleTypeChange();
            await loadInventoryData();
            transitionScreen('main-screen');
        } catch(err) {
            showError(err.message);
            transitionScreen('login-screen');
        }
    }

    function applyLanguageOverlay() {
        if(!dictionary) return;
        if(dictionary.title) document.getElementById('page-title').innerText = dictionary.title;
        if(dictionary.heading) document.getElementById('app-heading').innerText = dictionary.heading;
        if(dictionary.form_title) document.getElementById('form-heading').innerText = dictionary.form_title;
        if(dictionary.table_title) document.getElementById('table-heading').innerText = dictionary.table_title;

        if(dictionary.fields) {
            const f = dictionary.fields;
            if(f.group_id) document.getElementById('lbl-group').innerText = f.group_id;
            if(f.type) document.getElementById('lbl-type').innerText = f.type;
            if(f.id) document.getElementById('lbl-uid').innerText = f.id;
            if(f.model_name) document.getElementById('lbl-name').innerText = f.model_name;
            if(f.qty) document.getElementById('lbl-qty').innerText = f.qty;
            if(f.base_cost) document.getElementById('lbl-cost').innerText = f.base_cost;
            document.getElementById('lbl-base-unit').innerText = "Base Unit";
            if(f.region) document.getElementById('lbl-region').innerText = f.region;
            if(f.model_code) document.getElementById('lbl-code').innerText = f.model_code;
            if(f.alt_code) document.getElementById('lbl-alt-code').innerText = f.alt_code;
            if(f.serial_number) document.getElementById('lbl-serial').innerText = f.serial_number;
        }

        const headersRow = document.getElementById('table-headers');
        headersRow.innerHTML = '';
        if(dictionary.table_columns) {
            dictionary.table_columns.forEach(col => {
                const th = document.createElement('th');
                th.className = "px-6 py-3";
                th.innerText = (col === "Currency" || col === "currency") ? "Unit" : col;
                headersRow.appendChild(th);
            });
            const thAction = document.createElement('th');
            thAction.className = "px-6 py-3 text-right";
            thAction.innerText = "Operations";
            headersRow.appendChild(thAction);
        }
    }

    function populateFormDropdowns() {
        if(!dictionary) return;
        
        const groupSel = document.getElementById('add-group');
        groupSel.innerHTML = '';
        if(dictionary.portfolios) {
            dictionary.portfolios.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id; opt.innerText = p.label;
                groupSel.appendChild(opt);
            });
        }

        const typeSel = document.getElementById('add-type');
        typeSel.innerHTML = '';
        if(dictionary.categories) {
            dictionary.categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id; opt.innerText = c.label;
                typeSel.appendChild(opt);
            });
        }

        const baseUnitSel = document.getElementById('add-base-unit');
        baseUnitSel.innerHTML = '';
        if(dictionary.currencies) {
            dictionary.currencies.forEach(cur => {
                const opt = document.createElement('option');
                opt.value = cur; opt.innerText = cur;
                baseUnitSel.appendChild(opt);
            });
        }

        const regionSel = document.getElementById('add-region');
        regionSel.innerHTML = '';
        if(dictionary.regions) {
            dictionary.regions.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r; opt.innerText = r;
                regionSel.appendChild(opt);
            });
        }
    }

    function handleTypeChange() {
        const typeSelect = document.getElementById('add-type');
        const codeInput = document.getElementById('add-code');
        const altCodeInput = document.getElementById('add-alt-code');
        const baseUnitSelect = document.getElementById('add-base-unit');
        const regionSelect = document.getElementById('add-region');
        const serialInput = document.getElementById('add-serial');
        
        if (typeSelect.value && typeSelect.value.startsWith('CA')) {
            codeInput.disabled = true;
            altCodeInput.disabled = true;
            codeInput.value = '';
            altCodeInput.value = '';
            codeInput.placeholder = "N/A";
            altCodeInput.placeholder = "N/A";
            
            regionSelect.value = "NONE";
            regionSelect.disabled = true;
            regionSelect.classList.add('bg-gray-100', 'text-gray-400');
            
            serialInput.placeholder = "N/A";
            serialInput.required = false;

            baseUnitSelect.disabled = false;
            baseUnitSelect.classList.remove('bg-gray-100', 'text-gray-400');
        } else {
            codeInput.disabled = false;
            altCodeInput.disabled = false;
            regionSelect.disabled = false;
            regionSelect.classList.remove('bg-gray-100', 'text-gray-400');
            baseUnitSelect.disabled = false; 
            
            if (dictionary && dictionary.fields) {
                codeInput.placeholder = dictionary.fields.model_code;
                altCodeInput.placeholder = dictionary.fields.alt_code;
                serialInput.placeholder = dictionary.fields.serial_number;
            }
        }
    }

    async function loadInventoryData() {
        hideError();
        try {
            const response = await fetch(`${API_ROUTE}?action=list`, {
                method: 'GET',
                headers: getSecureHeaders()
            });
            if(!response.ok) throw new Error('Failed to retrieve active topologies.');
            
            const payload = await response.json();
            renderTableRecords(payload.assets || []);
            renderConsolidationStats(payload.aggregations || {});
        } catch(err) {
            showError(err.message);
        }
    }

    function renderConsolidationStats(aggs) {
        const container = document.getElementById('stats-container');
        container.innerHTML = '';
        if(!aggs || Object.keys(aggs).length === 0) return;

        Object.entries(aggs).forEach(([unit, val]) => {
            const span = document.createElement('span');
            span.className = "bg-slate-100 px-2.5 py-1 rounded-md border border-slate-200 text-xs font-bold text-slate-800 shadow-sm";
            span.innerText = `${Number(val).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})} ${unit}`;
            container.appendChild(span);
        });
    }

    function renderTableRecords(assets) {
        const tBody = document.getElementById('inventory-table-body');
        tBody.innerHTML = '';

        if(assets.length === 0) {
            tBody.innerHTML = `<tr><td colspan="${(dictionary?.table_columns?.length || 5) + 1}" class="px-6 py-8 text-center text-gray-400 italic">No nodes registered in this network footprint.</td></tr>`;
            return;
        }

        assets.forEach(node => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition duration-150";

            if(dictionary && dictionary.table_columns) {
                dictionary.table_columns.forEach(col => {
                    const td = document.createElement('td');
                    td.className = "px-6 py-3.5 whitespace-nowrap";
                    
                    let key = col.toLowerCase().replace(/ /g, '_');
                    if (key === 'unit' || key === 'currency') key = 'base_currency';
                    
                    let val = node[key];
                    if (val === undefined || val === null) {
                        if (key === 'group') val = node['portfolio_id'];
                        else if (key === 'label_name') val = node['symbol'];
                        else if (key === 'system_code') val = node['ticker'];
                        else if (key === 'backup_code') val = node['proxy_ticker'];
                        else if (key === 'acquisition_cost') val = node['purchase_price'];
                        else val = '-';
                    }

                    if(typeof val === 'number' || (!isNaN(val) && !isNaN(parseFloat(val)) && (key === 'qty' || key === 'acquisition_cost' || key === 'valuation' || key === 'purchase_price'))) {
                        td.innerText = Number(val).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4});
                    } else {
                        td.innerText = val;
                    }
                    tr.appendChild(td);
                });
            }

            const tdAction = document.createElement('td');
            tdAction.className = "px-6 py-3.5 whitespace-nowrap text-right";
            tdAction.innerHTML = `<button onclick="purgeHardware('${node.id}')" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 font-semibold py-1 px-2.5 border border-red-200 rounded transition">Purge Node</button>`;
            tr.appendChild(tdAction);

            tBody.appendChild(tr);
        });
    }

    async function registerHardware() {
        hideError();
        const payload = {
            group_id: document.getElementById('add-group').value,
            type: document.getElementById('add-type').value,
            target: document.getElementById('add-uid').value.trim(),
            model_name: document.getElementById('add-name').value.trim(),
            allocation: document.getElementById('add-qty').value.trim(),
            base_cost: document.getElementById('add-cost').value.trim(),
            base_unit: document.getElementById('add-base-unit').value,
            region: document.getElementById('add-region').value,
            model_code: document.getElementById('add-code').value.trim(),
            alt_code: document.getElementById('add-alt-code').value.trim(),
            serial_number: document.getElementById('add-serial').value.trim()
        };

        if(!payload.target || !payload.model_name || !payload.allocation || !payload.base_cost) {
            return alert('All primary descriptors are core dependencies.');
        }

        try {
            const response = await fetch(`${API_ROUTE}?action=commit`, {
                method: 'POST',
                headers: getSecureHeaders(),
                body: JSON.stringify(payload)
            });

            if(!response.ok) {
                const fault = await response.json();
                throw new Error(fault.error || "Exception during deployment.");
            }

            ['add-uid', 'add-name', 'add-qty', 'add-cost', 'add-code', 'add-alt-code', 'add-serial'].forEach(id => {
                document.getElementById(id).value = "";
            });

            loadInventoryData();
        } catch (err) {
            showError(err.message);
        }
    }

    async function purgeHardware(targetUid) {
        if (!confirm(`Confirm irreversible purge sequence for node: ${targetUid}?`)) return;
        hideError();

        try {
            const response = await fetch(`${API_ROUTE}?action=purge`, {
                method: 'POST',
                headers: getSecureHeaders(),
                body: JSON.stringify({ target: targetUid })
            });

            if(!response.ok) {
                const fault = await response.json();
                throw new Error(fault.error || "Failed to remove records.");
            }

            loadInventoryData();
        } catch (err) {
            showError(err.message);
        }
    }

    function showError(msg) {
        const errorDiv = document.getElementById('error-msg');
        errorDiv.innerText = msg; 
        errorDiv.classList.remove('hidden');
    }
    
    function hideError() { 
        document.getElementById('error-msg').classList.add('hidden'); 
    }
</script>
</body>
</html>
